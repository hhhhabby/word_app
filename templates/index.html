<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词谐音助记生成器</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>📚 单词谐音助记生成器</h1>
            <p class="subtitle">上传 Excel 单词表，自动从趣记单词 API 获取谐音助记</p>
        </div>
        
        <div class="main-content">
            <div class="upload-section">
                <form id="upload-form" enctype="multipart/form-data">
                    <div class="upload-area">
                        <div class="file-input-wrapper">
                            <input type="file" name="file" id="file-input" accept=".xlsx,.xls" required>
                            <div class="upload-icon">📁</div>
                            <h3>选择 Excel 文件</h3>
                            <p class="upload-hint">支持 .xlsx 和 .xls 格式</p>
                            <p class="upload-requirement">需包含"英文"列</p>
                            <span id="file-name" class="file-name"></span>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">上传并生成</button>
                </form>
            </div>
        </div>
        
        <!-- 进度显示区域 -->
        <div id="progress-section" class="progress-section" style="display: none;">
            <div class="progress-header">
                <h3>📊 处理进度</h3>
            </div>
            
            <div class="progress-stats">
                <div class="stat-card">
                    <span class="stat-label">总单词数</span>
                    <span class="stat-value" id="total-words">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">已处理</span>
                    <span class="stat-value" id="processed-words">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">剩余</span>
                    <span class="stat-value" id="remaining-words">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">处理时间</span>
                    <span class="stat-value" id="processing-time">0 秒</span>
                </div>
            </div>
            
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-percentage">0%</div>
        </div>
        
        <div class="info-section">
            <h3><span class="warning-icon">⚠️</span> 💡 使用说明</h3>
            <ul>
                <li><strong>Excel 文件必须包含"英文"列</strong></li>
                <li><strong>支持 .xlsx 和 .xls 格式</strong></li>
                <li><strong>每个单词查询间隔 2 秒，避免 API 限制</strong></li>
                <li><strong>处理完成后自动下载结果</strong></li>
            </ul>
        </div>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
