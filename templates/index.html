<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word App 功能总览</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --ink: #1f2937;
            --muted: #64748b;
            --blue: #1d4ed8;
            --red: #dc2626;
            --line: #dbe4f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 20%, #eef4ff, #f7f9fd 45%, #f3f6fb);
            color: var(--ink);
            min-height: 100vh;
        }

        .wrap {
            max-width: 1080px;
            margin: 48px auto;
            padding: 0 20px;
        }

        .hero {
            background: linear-gradient(125deg, #1d4ed8, #2563eb);
            color: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 38px rgba(37, 99, 235, 0.28);
        }

        .hero h1 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .hero p {
            opacity: 0.95;
            line-height: 1.7;
        }

        .grid {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 999px;
            margin-bottom: 12px;
            color: #fff;
        }

        .badge-blue {
            background: var(--blue);
        }

        .badge-red {
            background: var(--red);
        }

        .card h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .card p {
            color: var(--muted);
            line-height: 1.7;
            min-height: 72px;
        }

        .btn {
            margin-top: 16px;
            display: inline-block;
            text-decoration: none;
            font-weight: 700;
            color: #fff;
            border-radius: 10px;
            padding: 10px 16px;
        }

        .btn-blue {
            background: var(--blue);
        }

        .btn-red {
            background: var(--red);
        }

        .note {
            margin-top: 22px;
            color: #475569;
            font-size: 14px;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <section class="hero">
            <h1>Word App 功能总览</h1>
            <p>这里是统一入口。系统包含两个互相独立、可单独维护的页面：一个处理 PDF 到 Excel，另一个处理 Excel 批量查询趣记 API 并写回。</p>
        </section>

        <section class="grid">
            <article class="card">
                <span class="badge badge-blue">功能 A</span>
                <h2>PDF 到 Excel</h2>
                <p>上传 PDF，配置 API 密钥，调用模型识别后导出 Excel。包含进度条、日志和下载流程。</p>
                <a class="btn btn-blue" href="{{ url_for('pages.pdf_to_excel_page') }}">进入 PDF 页面</a>
            </article>

            <article class="card">
                <span class="badge badge-red">功能 B</span>
                <h2>Excel 趣记写回</h2>
                <p>上传 Excel（需含“英文”列），批量查询趣记单词 API，并将谐音助记写回新列后下载。</p>
                <a class="btn btn-red" href="{{ url_for('pages.excel_mnemonic_page') }}">进入 Excel 页面</a>
            </article>
        </section>

        <p class="note">提示：两项功能路由和模板均已拆分，后续可独立迭代，互不影响。</p>
    </div>
</body>

</html>
