<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词谐音助记生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #222222;
        }

        header {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 28px;
            font-weight: 900;
            color: #222222;
        }

        .logo i {
            color: #ff3b30;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            text-decoration: none;
            color: #222222;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
        }

        nav a.active {
            color: #ff3b30;
            border-bottom: 2px solid #ff3b30;
        }

        .auth-buttons {
            display: flex;
            gap: 16px;
        }

        .auth-buttons a {
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
        }

        .login-btn {
            color: #222222;
        }

        .signup-btn {
            background-color: #ff3b30;
            color: #ffffff;
        }

        main {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 24px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #222222;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 20px;
            color: #555555;
            margin-bottom: 48px;
            line-height: 1.5;
        }

        .upload-area {
            background-color: #f9f9f9;
            border: 2px dashed #cccccc;
            border-radius: 12px;
            padding: 60px 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: #ff3b30;
            background-color: #fff5f5;
        }

        .upload-area.dragover {
            border-color: #ff3b30;
            background-color: #ffebeb;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background-color: #ff3b30;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .upload-btn:hover {
            background-color: #e0352b;
        }

        .upload-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .cloud-options {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 24px 0;
        }

        .cloud-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #ff3b30;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .cloud-btn:hover {
            background-color: #e0352b;
        }

        .drop-hint {
            font-size: 16px;
            color: #555555;
            margin-top: 16px;
        }

        .hint {
            margin-top: 32px;
            font-size: 14px;
            color: #777777;
            line-height: 1.6;
        }

        .progress-panel {
            max-width: 800px;
            margin: 24px auto 0;
            padding: 20px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            background: #fafafa;
            text-align: left;
            display: none;
        }

        .progress-title {
            font-size: 18px;
            font-weight: 700;
            color: #222222;
            margin-bottom: 12px;
        }

        .progress-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .progress-item {
            background: #ffffff;
            border: 1px solid #ececec;
            border-radius: 8px;
            padding: 10px;
        }

        .progress-item .label {
            display: block;
            color: #666666;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .progress-item .value {
            display: block;
            color: #222222;
            font-size: 20px;
            font-weight: 700;
        }

        .progress-bar-wrap {
            height: 14px;
            width: 100%;
            background: #ececec;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3b30, #e0352b);
            transition: width 0.3s ease;
        }

        .progress-status {
            margin-top: 10px;
            color: #444444;
            font-size: 14px;
        }

        @media (max-width: 860px) {
            .progress-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <i>❤️</i>
            <span>WORD</span>
        </div>
        <nav>
            <a href="{{ url_for('pages.index') }}" class="active">功能总览</a>
            <a href="{{ url_for('pages.pdf_to_excel_page') }}">PDF 到 Excel</a>
            <a href="{{ url_for('pages.excel_mnemonic_page') }}">Excel 趣记写回</a>
        </nav>
        <div class="auth-buttons">
            <a href="#" class="login-btn">登录</a>
            <a href="#" class="signup-btn">注册</a>
        </div>
    </header>

    <main>
        <h1>单词谐音助记生成器</h1>
        <p class="subtitle">上传你的单词 Excel 文件，一键批量查询趣记 API 并写回“趣记单词_谐音助记”列</p>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" class="file-input" accept=".xlsx" required>
            <button class="upload-btn" id="uploadBtn">选择Excel文件</button>
            <div class="cloud-options">
                <div class="cloud-btn" title="从Google Drive选择">📁</div>
                <div class="cloud-btn" title="从Dropbox选择">☁️</div>
            </div>
            <p class="drop-hint">或者直接拖拽文件到这里</p>
        </div>

        <p class="hint">请确保 Excel 表格中包含标题为 "英文" 的列。<br>处理需要一定时间（每个单词约2秒），请耐心等待。</p>

        <section id="progressPanel" class="progress-panel">
            <div class="progress-title">处理进度</div>
            <div class="progress-stats">
                <div class="progress-item">
                    <span class="label">总单词数</span>
                    <span class="value" id="totalWords">0</span>
                </div>
                <div class="progress-item">
                    <span class="label">已处理</span>
                    <span class="value" id="processedWords">0</span>
                </div>
                <div class="progress-item">
                    <span class="label">剩余</span>
                    <span class="value" id="remainingWords">0</span>
                </div>
                <div class="progress-item">
                    <span class="label">运行秒数</span>
                    <span class="value" id="elapsedSeconds">0</span>
                </div>
            </div>
            <div class="progress-bar-wrap">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
            <div id="progressStatus" class="progress-status">等待开始...</div>
        </section>
    </main>

    <script>
        const API_PROCESS_EXCEL_URL = "{{ url_for('excel_api.process_excel_file') }}";
        const API_PROGRESS_URL = "{{ url_for('pdf_api.get_progress') }}";

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressPanel = document.getElementById('progressPanel');
        const totalWordsEl = document.getElementById('totalWords');
        const processedWordsEl = document.getElementById('processedWords');
        const remainingWordsEl = document.getElementById('remainingWords');
        const elapsedSecondsEl = document.getElementById('elapsedSeconds');
        const progressBarFillEl = document.getElementById('progressBarFill');
        const progressStatusEl = document.getElementById('progressStatus');

        let progressTimer = null;
        let startedAtMs = null;

        uploadBtn.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                processFile();
            }
        });

        fileInput.addEventListener('change', processFile);

        function setProgress(percentage) {
            const value = Math.max(0, Math.min(100, Math.round(percentage)));
            progressBarFillEl.style.width = value + '%';
        }

        function startProgressPolling() {
            progressPanel.style.display = 'block';
            progressStatusEl.textContent = '正在处理...';
            setProgress(0);
            if (progressTimer) {
                clearInterval(progressTimer);
            }
            progressTimer = setInterval(fetchProgress, 600);
        }

        function stopProgressPolling() {
            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }
        }

        async function fetchProgress() {
            try {
                const response = await fetch(API_PROGRESS_URL);
                const data = await response.json();

                const total = Number(data.total || 0);
                const processed = Number(data.processed || 0);
                const remaining = Number(data.remaining || 0);

                totalWordsEl.textContent = total;
                processedWordsEl.textContent = processed;
                remainingWordsEl.textContent = remaining;

                if (data.start_time) {
                    const startMs = new Date(data.start_time).getTime();
                    if (!Number.isNaN(startMs)) {
                        startedAtMs = startMs;
                    }
                }

                const endMs = data.end_time ? new Date(data.end_time).getTime() : Date.now();
                if (startedAtMs && !Number.isNaN(endMs)) {
                    const elapsed = Math.max(0, Math.floor((endMs - startedAtMs) / 1000));
                    elapsedSecondsEl.textContent = elapsed;
                }

                const percent = total > 0 ? (processed / total) * 100 : 0;
                setProgress(percent);

                if (data.is_processing) {
                    progressStatusEl.textContent = `处理中：${processed}/${total}`;
                } else {
                    progressStatusEl.textContent = '处理结束';
                    stopProgressPolling();
                }
            } catch (error) {
                progressStatusEl.textContent = '进度读取失败';
            }
        }

        async function processFile() {
            const file = fileInput.files[0];
            if (!file) {
                return;
            }

            startedAtMs = Date.now();
            totalWordsEl.textContent = '0';
            processedWordsEl.textContent = '0';
            remainingWordsEl.textContent = '0';
            elapsedSecondsEl.textContent = '0';
            startProgressPolling();

            uploadBtn.disabled = true;
            uploadBtn.innerText = '正在处理中（每个单词约2秒）...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(API_PROCESS_EXCEL_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    await fetchProgress();
                    progressStatusEl.textContent = '处理完成，正在下载文件...';
                    setProgress(100);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '带谐音助记.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    alert('处理完成！文件已下载。');
                } else {
                    await fetchProgress();
                    const errText = await response.text();
                    progressStatusEl.textContent = '处理失败';
                    alert('错误：' + errText);
                }
            } catch (error) {
                progressStatusEl.textContent = '请求失败';
                alert('请求失败，请检查网络或后台服务。');
                console.error(error);
            } finally {
                stopProgressPolling();
                uploadBtn.disabled = false;
                uploadBtn.innerText = '选择Excel文件';
                fileInput.value = '';
            }
        }
    </script>
</body>

</html>
